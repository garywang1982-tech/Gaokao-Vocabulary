<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>高考核心词组与词汇互动练习</title>
<style>
:root {
  --bg1:#f7fbff; --bg2:#eef4ff; --card:#ffffff; --ink:#233044; --muted:#6b7a90;
  --blue:#3267d6; --cyan:#12a8b8; --orange:#ff9f43; --green:#22a06b; --red:#e25555;
  --line:#dce6f2; --shadow:0 14px 35px rgba(36,72,120,.12);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--ink);
background:radial-gradient(circle at top left,#e3f7ff,transparent 32%),linear-gradient(135deg,var(--bg1),var(--bg2));}
header{padding:34px 22px 20px;text-align:center}
h1{margin:0;font-size:clamp(26px,4vw,42px);letter-spacing:.5px;color:#18315a}
.subtitle{margin:10px auto 0;max-width:820px;color:var(--muted);line-height:1.7}
.app{max-width:1180px;margin:0 auto 42px;padding:0 18px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:10px 0 18px}
.stat{background:rgba(255,255,255,.82);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px;padding:18px}
.stat b{display:block;font-size:28px;color:var(--blue)}.stat span{color:var(--muted);font-size:13px}
.tabs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:18px 0}
.tab{border:0;background:white;color:#28415f;padding:12px 18px;border-radius:999px;box-shadow:0 8px 20px rgba(30,65,110,.10);cursor:pointer;font-weight:700}
.tab.active{background:linear-gradient(135deg,var(--blue),var(--cyan));color:white}
.panel{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:26px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.panel h2{margin:0 0 12px;color:#18315a}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0}
button{font:inherit}
.btn{border:0;border-radius:14px;padding:11px 15px;cursor:pointer;font-weight:700;background:#edf4ff;color:#21446d}
.btn.primary{background:linear-gradient(135deg,var(--blue),var(--cyan));color:white}
.btn.good{background:#e9f8f1;color:#166143}.btn.warn{background:#fff4df;color:#8a5300}
select,input{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px}
.question{font-size:18px;line-height:1.65;margin:10px 0 14px}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.opt{border:1px solid var(--line);background:#f8fbff;border-radius:16px;padding:12px;cursor:pointer;text-align:left}
.opt.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,103,214,.15)}
.opt.correct{background:#e9f8f1;border-color:var(--green)}.opt.wrong{background:#fff0f0;border-color:var(--red)}
.word-bank{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:14px 0}
.bank-item{border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:10px 12px;line-height:1.35}
.bank-letter{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#e5efff;color:#21446d;font-weight:800;margin-right:8px}
.cloze-choices{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.letter-btn{width:42px;height:38px;border:1px solid var(--line);border-radius:12px;background:#f8fbff;color:#21446d;cursor:pointer;font-weight:800}
.letter-btn.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,103,214,.15)}
.letter-btn.correct{background:#e9f8f1;border-color:var(--green);color:#166143}
.letter-btn.wrong{background:#fff0f0;border-color:var(--red);color:#a53b3b}
.cloze-answer{margin-top:8px;font-weight:700}
.match-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0;align-items:center}
.badge{display:inline-block;border-radius:999px;background:#eef5ff;color:#315f9b;padding:3px 9px;font-size:12px;margin-left:6px}
.feedback{min-height:28px;font-weight:700;margin-top:10px}.ok{color:var(--green)}.no{color:var(--red)}
.review{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.review-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
.review-card h3{margin:0 0 6px;color:#18315a}.small{font-size:13px;color:var(--muted);line-height:1.6}
.example{border-top:1px dashed var(--line);margin-top:8px;padding-top:8px;line-height:1.55;font-size:13px}
.progress{height:10px;background:#eaf1fb;border-radius:999px;overflow:hidden;margin:10px 0 4px}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--orange),var(--cyan));transition:.25s}
.hidden{display:none!important}
.footer-note{text-align:center;color:var(--muted);font-size:12px;margin-top:20px}
@media(max-width:860px){.stats,.grid,.options,.match-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>高考核心词组与词汇互动练习</h1>
  <p class="subtitle">用真实语境练习高考常见词汇与词组，完成后可进入回顾界面复习。</p>
</header>
<div class="app">
  <nav class="tabs">
    <button class="tab active" data-view="choice">四选一练习</button>
    <button class="tab" data-view="fill">单词填空练习</button>
    <button class="tab" data-view="cloze">选词填空练习</button>
    <button class="tab" data-view="review">单词/词组回顾</button>
  </nav>

  <section id="view-choice" class="panel">
    <h2>四选一练习 <span class="badge">每轮10题</span></h2>
    <div class="small">根据句子语境，从 A、B、C、D 四个选项中选择最合适的词或词组。</div>
    <div class="toolbar">
      <button class="btn primary" onclick="newChoice()">开始/换一轮</button>
      <button class="btn good" onclick="checkChoice()">提交答案</button>
    </div>
    <div class="progress"><div id="choiceBar" class="bar"></div></div>
    <div id="choiceBox"></div>
    <div id="choiceFeedback" class="feedback"></div>
  </section>

  <section id="view-fill" class="panel hidden">
    <h2>单词填空练习 <span class="badge">根据句意填写原词或变形</span></h2>
    <div class="toolbar">
      <button class="btn primary" onclick="newFill()">下一题</button>
      <button class="btn good" onclick="checkFill()">检查</button>
    </div>
    <div class="card">
      <div class="small" id="fillHint"></div>
      <div class="question" id="fillSentence"></div>
      <input id="fillAnswer" placeholder="输入答案，如：benefits / led to / significant">
      <div id="fillFeedback" class="feedback"></div>
    </div>
  </section>

  <section id="view-cloze" class="panel hidden">
    <h2>选词填空练习 <span class="badge">每轮8题</span></h2>
    <div class="small">参考顶部词库的字母编号，为每道题选择最合适的词或词组。注意语境、搭配和词形。</div>
    <div class="toolbar">
      <button class="btn primary" onclick="newCloze()">开始/换一轮</button>
      <button class="btn good" onclick="checkCloze()">提交答案</button>
    </div>
    <div id="wordBank" class="toolbar"></div>
    <div id="clozeBox"></div>
    <div id="clozeFeedback" class="feedback"></div>
  </section>

  <section id="view-review" class="panel hidden">
    <h2>单词/词组回顾</h2>
    <div class="toolbar">
      <select id="reviewKind" onchange="renderReview()">
        <option value="all">全部类型</option><option value="词组">词组</option><option value="结构">结构</option><option value="重点词">重点词</option>
      </select>
      <input id="reviewSearch" oninput="renderReview()" placeholder="搜索英文或中文标签">
      <button class="btn warn" onclick="showWrongOnly()">只看错题/已练条目</button>
      <button class="btn" onclick="resetWrongFilter()">恢复全部</button>
    </div>
    <div id="reviewBox" class="review"></div>
  </section>
  <div class="footer-note">完成练习后，可进入回顾界面整理错题和高频表达。</div>
</div>

, "isOriginal": false}, {"term": "obstacle", "kind": "重点词", "tag": "障碍", "blank": {"sentence": "In academic reading, students should understand how the word ________ is used to express 障碍.", "answer": "obstacle", "source": "自编句"}, "isOriginal": false}, {"term": "in honor/memory of", "kind": "词组", "tag": "纪念", "blank": {"sentence": "In this context, the expression ________ helps show the idea of 纪念.", "answer": "in honor", "source": "自编句"}, "isOriginal": false}, {"term": "in contrast to/with", "kind": "结构", "tag": "对比", "blank": {"sentence": "In this context, the expression ________ helps show the idea of 对比.", "answer": "in contrast to", "source": "自编句"}, "isOriginal": false}, {"term": "cope with", "kind": "词组", "tag": "应对", "blank": {"sentence": "The new plan is designed to ________ the problem of weak vocabulary.", "answer": "cope with", "source": "自编句"}, "isOriginal": false}, {"term": "make use of", "kind": "词组", "tag": "利用", "blank": {"sentence": "Students should ________ free online resources to improve pronunciation.", "answer": "make use of", "source": "自编句"}, "isOriginal": false}];
let score=0, done=0, practiced=new Set(), wrongSet=new Set(), reviewWrongOnly=false;
let choiceRound=[], fillCurrent=null, clozeRound=[];

function $(id){return document.getElementById(id)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function sample(arr,n){return shuffle(arr).slice(0,n)}
function updateStats(){
  const scoreEl=$('score'), doneEl=$('done');
  if(scoreEl) scoreEl.textContent=score;
  if(doneEl) doneEl.textContent=done;
}
function termLabel(x){ return x.kind+'｜'+x.tag; }
function clean(s){return (s||'').trim().toLowerCase().replace(/\s+/g,' ')}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function cleanExampleText(s){return String(s||'').replace(/\(\s*[A-D]\s*\)\s*/g,'').replace(/\s+\d{1,2}\.\s*$/,'').replace(/_{3,}\s*\d*\s*_{0,}/g,'________').replace(/\s{2,}/g,' ').trim()}

function getChineseHint(item){return item.tag || item.kind || '核心表达'}
function getInitialHint(term){
  const t=String(term||'').trim();
  if(!t) return '';
  const parts=t.split(/[\s/]+/).filter(Boolean);
  return parts.map(p=>p[0]).join(' / ');
}
function makeDistractors(item, n=3){
  const answer=clean(item.blank?.answer || item.term);
  const sameMeaning=EXERCISES.filter(x=>x.term!==item.term && (x.tag===item.tag || x.kind===item.kind));
  const closeSpelling=EXERCISES.filter(x=>x.term!==item.term && (x.term[0]||'').toLowerCase()===(item.term[0]||'').toLowerCase());
  const similarLength=EXERCISES.filter(x=>x.term!==item.term && Math.abs(x.term.length-item.term.length)<=3);
  const all=[...sameMeaning, ...closeSpelling, ...similarLength, ...EXERCISES.filter(x=>x.term!==item.term)];
  const out=[];
  for(const x of all){
    const v=x.blank?.answer || x.term;
    if(clean(v)!==answer && !out.some(y=>clean(y)===clean(v))) out.push(v);
    if(out.length>=n) break;
  }
  return out.slice(0,n);
}

document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[id^=view-]').forEach(v=>v.classList.add('hidden'));
  $('view-'+btn.dataset.view).classList.remove('hidden');
  if(btn.dataset.view==='review') renderReview();
});

function newChoice(){
  const pool=EXERCISES;
  choiceRound=sample(pool,10).map(item=>{
    const answer=item.blank.answer;
    const options=shuffle([answer, ...makeDistractors(item,3)]).slice(0,4);
    return {...item, choiceOptions:options, chosen:''};
  });
  $('choiceBox').innerHTML=choiceRound.map((x,i)=>`
    <div class="card" style="margin-bottom:12px" data-term="${esc(x.term)}">
      <div class="question">${i+1}. ${esc(x.blank.sentence)}</div>
      <div class="options">
        ${x.choiceOptions.map((op,j)=>`<button class="opt" type="button" data-value="${esc(op)}" onclick="chooseOption(${i}, this)">${'ABCD'[j]}. ${esc(op)}</button>`).join('')}
      </div>
      <div class="small">提示：注意句意和搭配。</div>
    </div>`).join('');
  $('choiceFeedback').textContent='';
  $('choiceBar').style.width='0%';
}
function chooseOption(i, btn){
  choiceRound[i].chosen=btn.dataset.value;
  btn.parentElement.querySelectorAll('.opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function checkChoice(){
  let correct=0;
  document.querySelectorAll('#choiceBox .card').forEach((card,i)=>{
    const item=choiceRound[i];
    practiced.add(item.term); done++;
    card.querySelectorAll('.opt').forEach(btn=>{
      const text=btn.textContent.replace(/^[A-D]\.\s*/,'').trim();
      if(clean(text)===clean(item.blank.answer)) btn.classList.add('correct');
      else if(btn.classList.contains('selected')) btn.classList.add('wrong');
    });
    if(clean(item.chosen)===clean(item.blank.answer)){correct++; score++;}
    else wrongSet.add(item.term);
  });
  updateStats();
  $('choiceBar').style.width=(correct/choiceRound.length*100)+'%';
  $('choiceFeedback').innerHTML=`本轮答对 <span class="ok">${correct}</span> / ${choiceRound.length}。`;
}

function newFill(){
  const pool=EXERCISES.filter(x=>x.kind==='重点词');
  fillCurrent=sample(pool,1)[0];
  $('fillHint').innerHTML='首字母提示：<b>'+esc(getInitialHint(fillCurrent.blank.answer || fillCurrent.term))+'</b>　中文提示：<b>'+esc(getChineseHint(fillCurrent))+'</b>';
  $('fillSentence').textContent=fillCurrent.blank.sentence;
  $('fillAnswer').value=''; $('fillFeedback').textContent='';
}
function checkFill(){
  if(!fillCurrent) return;
  const ans=clean($('fillAnswer').value), right=clean(fillCurrent.blank.answer);
  practiced.add(fillCurrent.term); done++;
  if(ans===right || ans===clean(fillCurrent.term)){ score++; $('fillFeedback').innerHTML='<span class="ok">正确！</span> 答案：'+fillCurrent.blank.answer; }
  else{ wrongSet.add(fillCurrent.term); $('fillFeedback').innerHTML='<span class="no">再想想。</span> 答案：'+fillCurrent.blank.answer+'；核心词：'+fillCurrent.term; }
  updateStats();
}

function newCloze(){
  const pool=EXERCISES;
  clozeRound=sample(pool,8);
  const bank=shuffle(clozeRound.map(x=>x.blank.answer)).map((word,i)=>({letter:String.fromCharCode(65+i), word}));
  const letters=bank.map(x=>x.letter);
  $('wordBank').className='word-bank';
  $('wordBank').innerHTML=bank.map(x=>`
    <div class="bank-item"><span class="bank-letter">${x.letter}.</span> ${esc(x.word)}</div>
  `).join('');
  $('clozeBox').innerHTML=clozeRound.map((x,i)=>`
    <div class="card" style="margin-bottom:10px">
      <div class="small">${i+1}. ${termLabel(x)}</div>
      <div class="question">${esc(x.blank.sentence)}</div>
      <div class="cloze-choices" data-answer="${esc(x.blank.answer)}" data-term="${esc(x.term)}">
        ${letters.map(letter=>`<button class="letter-btn" type="button" data-letter="${letter}" onclick="chooseClozeLetter(this)">${letter}</button>`).join('')}
      </div>
      <div class="small cloze-answer"></div>
    </div>`).join('');
  $('clozeFeedback').textContent='';
  $('clozeBox').dataset.bank=JSON.stringify(bank);
}
function getClozeWord(letter){
  const bank=JSON.parse($('clozeBox').dataset.bank || '[]');
  return (bank.find(x=>x.letter===letter) || {}).word || '';
}
function chooseClozeLetter(btn){
  const group=btn.closest('.cloze-choices');
  group.querySelectorAll('.letter-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  group.dataset.chosen=btn.dataset.letter;
}
function checkCloze(){
  let correct=0;
  [...$('clozeBox').querySelectorAll('.cloze-choices')].forEach(group=>{
    const chosenWord=getClozeWord(group.dataset.chosen);
    const answer=group.dataset.answer;
    const answerLetter=JSON.parse($('clozeBox').dataset.bank || '[]').find(x=>clean(x.word)===clean(answer))?.letter || '';
    practiced.add(group.dataset.term); done++;
    group.querySelectorAll('.letter-btn').forEach(btn=>{
      btn.classList.remove('correct','wrong');
      if(btn.dataset.letter===answerLetter) btn.classList.add('correct');
      else if(btn.classList.contains('selected')) btn.classList.add('wrong');
    });
    const answerBox=group.nextElementSibling;
    if(clean(chosenWord)===clean(answer)){
      correct++; score++;
      answerBox.innerHTML='<span class="ok">正确：</span>'+answerLetter+'. '+esc(answer);
    }else{
      wrongSet.add(group.dataset.term);
      const chosenText=group.dataset.chosen ? group.dataset.chosen+'. '+esc(chosenWord) : '未选择';
      answerBox.innerHTML='<span class="no">应选：</span>'+answerLetter+'. '+esc(answer)+'　你的答案：'+chosenText;
    }
  });
  updateStats();
  $('clozeFeedback').innerHTML=`本轮答对 <span class="ok">${correct}</span> / ${clozeRound.length}。`;
}

function renderReview(){
  const kind=$('reviewKind').value, kw=clean($('reviewSearch').value);
  let arr=DATA.filter(x=>kind==='all'||x.kind===kind);
  if(kw) arr=arr.filter(x=>clean(x.term+' '+x.tag+' '+x.kind).includes(kw));
  if(reviewWrongOnly) arr=arr.filter(x=>wrongSet.has(x.term)||practiced.has(x.term));
  $('reviewBox').innerHTML=arr.map(x=>`
    <div class="review-card">
      <h3>${x.term}</h3>
      <div class="small"><b>${x.kind}</b> · ${x.tag}</div>
      ${x.examples.slice(0,2).map(e=>`<div class="example"><b>${e.source}</b>｜${e.section}<br>${esc(cleanExampleText(e.sentence))}</div>`).join('') || '<div class="example">暂无短例句。</div>'}
    </div>`).join('');
}
function showWrongOnly(){reviewWrongOnly=true; renderReview();}
function resetWrongFilter(){reviewWrongOnly=false; renderReview();}

updateStats(); newChoice(); newFill(); newCloze(); renderReview();
</script>
